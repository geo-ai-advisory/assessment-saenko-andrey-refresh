    const html=new TextDecoder().decode(plain);
    document.open(); document.write(html); document.close();
  } catch(e) {
    err.textContent='Неверный пароль';
  }
}
document.getElementById('go').addEventListener('click', openPage);
document.getElementById('pw').addEventListener('keydown', e=>{ if(e.key==='Enter') openPage(); });
</script>
